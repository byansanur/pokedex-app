on:
  push:
    branches:
      - "main"
jobs:
  build:
    name: Build, Test, Release
    runs-on: ubuntu-latest

    steps:
      # 1. Mengambil kode dari repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java Development Kit (JDK)
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup Gradle dan Cache
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4. Membuat local.properties dan memasukkan semua Secret Variables
      - name: Create local.properties
        run: |
          cat <<EOF > local.properties
          baseUrl=${{ secrets.BASE_URL }}
          imageUrl=${{ secrets.IMAGE_URL }}
          dbSecretKeySha256=${{ secrets.DB_SECRET_KEY }}
          EOF

      # 5. Memberikan akses eksekusi pada file gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 6. Decode Keystore dari GitHub Secrets ke Root Project
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > release-keystore.jks

      # 7. Menjalankan Linter & Unit Test (Pakai flavor Dev)
      - name: Run Unit Tests
        run: ./gradlew testDevelopmentDebugUnitTest

      # 8. Build Release APK (Pakai flavor Prod) dengan suntikan variabel
      - name: Build Prod Release APK
        env:
          STORE_FILE: ../release-keystore.jks
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleProductionRelease

      # 9. Mengunggah hasil APK Production Release
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pokedex-Prod-Release-APK # Nama file zip saat di-download
          path: app/build/outputs/apk/production/release/*.apk # Path disesuaikan dengan flavor Prod Release
          retention-days: 7